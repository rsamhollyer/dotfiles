include-file = ~/.config/polybar/modules/import.ini

[global/wm]
module-margin-left = 0
module-margin-right = 0

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 30
fixed-center = true
background = #0000
foreground = #0000
font-0 = CaskaydiaCove Nerd Font:size=13;2
font-1 = CaskaydiaCove Nerd Font:size=20;5
font-2 = CaskaydiaCove Nerd Font:size=19;3
override-redirect = true

cursor-click = pointer
enable-ipc = true

wm-restack = bspwm
bottom = false
offset-x = 0
offset-y = 10
radius-top = 0
radius-bottom = 0

[bar/left]
inherit = bar/main
width = 17%
modules-center = round-left bspwm empty-space powerbar empty-space wallpaper round-right

[bar/center]
inherit = bar/main
width = 20%
offset-x = 38%
modules-center = round-left empty-space date empty-space weather wlan empty-space round-right

[bar/right]
inherit = bar/main
width = 25%
offset-x = 77%
modules-center = round-left diskspace pulseaudio memory cpu round-right

[module/empty-space]
type = custom/text
format = " "
format-background = ${colors.foreground}

[module/nothing]
type = custom/text
format = "   "
format-background = #0000

[module/round-left]
type = custom/text
format = %{T2}
format-foreground = ${colors.foreground}

[module/round-right]
type = custom/text
format = %{T2}
format-foreground = ${colors.foreground}

[settings]
screenchange-reload = true