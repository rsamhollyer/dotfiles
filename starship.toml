[battery]
charging_symbol = "вҡЎпёҸ "
discharging_symbol = "рҹ’Җ "
full_symbol = "п•ё"

[[battery.display]]
style = "bold red"
threshold = 30

[character]
error_symbol = "[X](bold red) "
success_symbol = "[пҖ… ](bold fg:50)"

[cmd_duration]
format = "оҺҠ [$duration]($style)"
min_time = 5_000

[directory]
format = " [$path]($style)[$lock_symbol]($lock_style) "
read_only = " п Ҫ"
style = "bold blue"
truncation_length = 5

[git_branch]
format = '\[[$symbol$branch]($style)\]'

[git_commit]
commit_hash_length = 8
style = "bold orange"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\)'

[git_status]
ahead = "пҒҗ x${count} (bold blue) "
behind = "рҹҗўx${count} (bold purple) "
conflicted = " пІ… (bold red)"
deleted = "п«§x${count} "
diverged = "п—ә пҒӘ  пҒҗ  x${ahead_count} рҹҗўx${behind_count} "
format = '\[$all_status$ahead_behind\]'
modified = "рҹ“қx${count} "
renamed = "пҒ„ x${count} "
staged = "пҷҹ x${count} "
stashed = "рҹ“Ұ "
untracked = "пҒӘx${count} "

[hostname]
disabled = false
format = "[$hostname]($style)"
ssh_only = false
style = "bold dimmed red"
trim_at = "-"

[memory_usage]
format = '\[$symbol[$ram( | $swap)]($style)\]'
symbol = "оүҰ  "

[package]
format = '\[[$symbol$version]($style)\]'

[nodejs]
format = '\[[$symbol($version)]($style)\]'

[cmake]
format = '\[[$symbol($version)]($style)\]'

[perl]
format = '\[[$symbol($version)]($style)\]'

[lua]
format = '\[[$symbol($version)]($style)\]'
symbol = "рҹҢҷ "

[python]
format = '\[[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style)\]'
symbol = "оңј "

[ruby]
format = '\[[$symbol($version)]($style)\]'
symbol = "оң№ "

[rust]
format = '\[[$symbol($version)]($style)\]'

[golang]
format = '\[[$symbol($version)]($style)\]'
symbol = "оҳ§ "

[php]
format = '\[[$symbol($version)]($style)\]'
symbol = "оҳҲ "

[scala]
format = '\[[$symbol($version)]($style)\]'
symbol = "оң· "

[shell]
disabled = false
style = "fg:122"
unknown_indicator = "mystery shell"
zsh_indicator = "п„  "

[nix_shell]
format = '\[[$symbol$state( \($name\))]($style)\]'
symbol = "пӢң "

[julia]
format = '\[[$symbol($version)]($style)\]'
symbol = "оҳӨ "

[java]
format = '\[[$symbol($version)]($style)\]'
symbol = "оү– "

[docker_context]
format = '\[[$symbol$context]($style)\]'
symbol = "пҢҲ "

[aws]
format = '\[[$symbol($profile)(\($region\))(\[$duration\])]($style)\]'
symbol = "оҢҪ  "

[conda]
format = '\[[$symbol$environment]($style)\]'
symbol = "п„Ң "

[dart]
format = '\[[$symbol($version)]($style)\]'
symbol = "оһҳ "

[time]
disabled = true
format = "$time($style) "
style = "dimmed green"
time_format = "%T"

[username]
show_always = true
style_user = "bold blue"
