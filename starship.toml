[battery]
full_symbol = "рҹ”Ӣ "
charging_symbol = "вҡЎпёҸ "
discharging_symbol = "рҹ’Җ "

[[battery.display]]
threshold = 30
style = "bold red"

[character]
error_symbol = "[ вң–](bold red) "
success_symbol = "[ пҢғ пҢҡ ](bold fg:27)"

[cmd_duration]
min_time = 5_000
format = "оҺҠ [$duration]($style)"

[directory]
truncation_length = 5
read_only = " п Ҫ"
format = " [$path]($style)[$lock_symbol]($lock_style) "
style = "bold blue"

[git_branch]
format = '\[[$symbol$branch]($style)\]'
symbol = "оңҲ "
style = "bold purple"

[git_commit]
commit_hash_length = 8
style = "bold orange"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\)'

[git_status]
conflicted = "пІ… (bold red)"
ahead = " пҒҗ  x${count} (bold blue)"
behind = " рҹҗў x${count} (bold purple)"
diverged = "п—ә пҒӘ  пҒҗ  x${ahead_count} рҹҗў x${behind_count}"
untracked = " пҒӘ x${count}"
stashed = "рҹ“Ұ "
modified = "рҹ“қx${count}"
staged = "пҷҹ  x${count}"
renamed = "пҒ„  x ${count}"
deleted = "п«§ x ${count}"
format = '\[$all_status$ahead_behind\]'

[hostname]
ssh_only = false
format = "[$hostname]($style)"
trim_at = "-"
style = "bold dimmed red"
disabled = false

[memory_usage]
symbol = "оүҰ  "
format = '\[$symbol[$ram( | $swap)]($style)\]'

[package]
symbol = "пЈ– "
format = '\[[$symbol$version]($style)\]'

[nodejs]
symbol = "оңҳ "
format = '\[[$symbol($version)]($style)\]'

[python]
symbol = "оңј "
format = '\[[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style)\]'

[ruby]
symbol = "оң№ "
format = '\[[$symbol($version)]($style)\]'

[rust]
symbol = "оһЁ "
format = '\[[$symbol($version)]($style)\]'

[golang]
symbol = "оҳ§ "
format = '\[[$symbol($version)]($style)\]'

[php]
symbol = "оҳҲ "
format = '\[[$symbol($version)]($style)\]'

[scala]
symbol = "оң· "
format = '\[[$symbol($version)]($style)\]'

[shell]
zsh_indicator = "п„  "
unknown_indicator = "mystery shell"
disabled = false
style ="fg:122"

[nix_shell]
symbol = "пӢң "
format = '\[[$symbol$state( \($name\))]($style)\]'

[julia]
symbol = "оҳӨ "
format = '\[[$symbol($version)]($style)\]'

[java]
symbol = "оү– "
format = '\[[$symbol($version)]($style)\]'

[docker_context]
symbol = "пҢҲ "
format = '\[[$symbol$context]($style)\]'

[aws]
symbol = "оҢҪ  "
format = '\[[$symbol($profile)(\($region\))(\[$duration\])]($style)\]'

[conda]
symbol = "п„Ң "
format = '\[[$symbol$environment]($style)\]'

[dart]
symbol = "оһҳ "
format = '\[[$symbol($version)]($style)\]'

[time]
time_format = "%T"
format = "$time($style) "
style = "dimmed green"
disabled = true

[username]
style_user = "bold blue"
show_always = true
